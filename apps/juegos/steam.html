<!-- steam.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam View - Mi Colección</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b0;
            --text-muted: #6b6b80;
            --accent: #e94560;
            --success: #4ecca3;
            --warning: #f0a500;
            --info: #3498db;
            --border: #2a2a3e;
            --radius-sm: 8px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --transition: 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1b2838;
            color: var(--text-primary);
            overflow-y: auto;
            height: 100vh;
            zoom: 150%;
        }

        .barra-steam {
            display: flex; align-items: center; gap: 20px; padding: 10px 24px;
            background: #171a21; border-bottom: 1px solid #222;
        }
        .barra-steam .logo { font-size: 20px; font-weight: bold; color: #fff; text-decoration: none; }
        .barra-steam nav { display: flex; gap: 5px; }
        .barra-steam nav a {
            color: #b8b6b4; text-decoration: none; padding: 8px 16px;
            border-radius: 4px; font-size: 14px; transition: all var(--transition); cursor: pointer;
        }
        .barra-steam nav a:hover, .barra-steam nav a.activo { color: #fff; background: rgba(255,255,255,0.05); }

        .contenedor-steam { display: flex; height: calc(100vh - 52px); }

        .lista-juegos-steam {
            width: 280px; min-width: 280px; background: #0d0d1a;
            overflow: hidden; border-right: 1px solid #222;
            display: flex; flex-direction: column;
        }
        .lista-juegos-steam-contenido { overflow-y: auto; flex: 1; }

        .juego-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s;
        }
        .juego-item:hover { background: rgba(255,255,255,0.05); }
        .juego-item.seleccionado { background: rgba(233,69,96,0.15); border-left: 3px solid var(--accent); }
        .juego-item img { width: 50px; height: 35px; object-fit: cover; border-radius: 3px; background: #1a1a2e; }
        .juego-item .info-item { flex: 1; min-width: 0; }
        .juego-item .nombre-item { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #c7c7c7; }
        .juego-item .plataforma-item { font-size: 10px; color: #666; margin-top: 2px; }

        .detalle-juego-steam { flex: 1; overflow-y: auto; background: #1b2838; position: relative; }
        .detalle-vacio { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; color: #888; text-align: center; position: absolute; top: 0; left: 0; }

        .juego-header-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(27,40,56,0.95) 60%, #1b2838); }
        .juego-header-info h2 { font-size: 36px; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .btn-jugar-steam {
            padding: 14px 40px; background: linear-gradient(135deg, var(--success), #2ecc71);
            color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-descargar-steam {
            padding: 14px 30px; background: var(--info); color: #fff; border: none;
            border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;
        }

        .juego-estadisticas { display: flex; gap: 40px; padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .estadistica-item { text-align: center; }
        .estadistica-item .valor { font-size: 18px; font-weight: bold; color: var(--success); }
        .estadistica-item .etiqueta { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .juego-descripcion { padding: 30px 40px; display: flex; gap: 30px; }
        .juego-descripcion h3 { color: #ccc; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }

        .dropdown-engranaje { position: relative; margin-left: 8px; }
        .btn-engranaje { padding: 14px 16px; background: rgba(255,255,255,0.08); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 18px; transition: all 0.3s; }
        .btn-engranaje:hover { background: rgba(255,255,255,0.15); }
        .dropdown-menu { position: absolute; bottom: 110%; right: 0; background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 6px; z-index: 50; min-width: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown-menu button { display: block; width: 100%; padding: 10px 14px; background: transparent; border: none; color: #ccc; font-size: 13px; cursor: pointer; text-align: left; border-radius: 6px; }
        .dropdown-menu button:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .tienda-steam { flex: 1; overflow-y: auto; padding: 24px; background: #1b2838; }
        .descargas-steam { flex: 1; overflow-y: auto; padding: 24px; background: #1b2838; }

        .tarjeta-tienda-steam {
            background: #16213e; border-radius: 10px; overflow: hidden; cursor: pointer;
            transition: transform 0.3s; border: 1px solid transparent;
        }
        .tarjeta-tienda-steam:hover { transform: translateY(-5px); border-color: #f0a500; }
        .img-tienda { width: 100%; aspect-ratio: 3/4; object-fit: fill; }

        .modal-tienda {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-tienda.activo { display: flex; }
        .modal-tienda-contenido {
            background: #16213e; padding: 30px; border-radius: 12px;
            width: 90%; max-width: 400px; border: 1px solid #333; text-align: center;
            position: relative;
        }
        .modal-cerrar {
            position: absolute; top: 10px; right: 10px; background: none; color: #888;
            border: none; font-size: 20px; cursor: pointer;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        * { scrollbar-width: thin; scrollbar-color: #3a3a4a transparent; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('usuarioActual')) { window.location.href = '/selector.html'; }
    </script>

    <div class="barra-steam">
        <a href="index.html" class="logo">🎮 Mi Colección</a>
        <nav>
            <a href="#" class="activo" id="navBiblioteca">📚 Biblioteca</a>
            <a href="#" id="navTienda">🛒 Tienda</a>
            <a href="#" id="navDescargas">📥 Descargas <span id="contadorDescargas" style="display:none;background:#e94560;color:#fff;border-radius:50%;padding:1px 6px;font-size:10px;">0</span></a>
        </nav>
        <a href="#" onclick="abrirModalOpcionesSteam()" style="color:#aaa;text-decoration:none;font-size:18px;padding:4px 8px;margin-left:auto;" title="Opciones">⚙️</a>
        <button onclick="cerrarSesionSteam()" style="padding:6px 12px;background:#e94560;color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:12px;">🚪 Cerrar Sesión</button>
    </div>

    <div class="contenedor-steam" id="contenedorSteam">
        <div class="lista-juegos-steam" id="listaJuegosSteam">
            <div style="padding:10px 14px;display:flex;gap:6px;position:sticky;top:0;background:#0d0d1a;z-index:10;border-bottom:1px solid #222;">
                <input type="text" id="busquedaBiblioteca" placeholder="🔍 Filtrar..." style="flex:1;padding:8px 12px;border:1px solid #333;border-radius:6px;background:#1a1a2e;color:#eee;font-size:12px;" oninput="filtrarBiblioteca()">
                <select id="filtroPlataformaBib" onchange="filtrarBiblioteca()" style="padding:8px;border:1px solid #333;border-radius:6px;background:#1a1a2e;color:#eee;font-size:11px;">
                    <option value="">Todas</option>
                    <option value="GBA">GBA</option><option value="DS">DS</option><option value="3DS">3DS</option>
                    <option value="PSP">PSP</option><option value="PS2">PS2</option><option value="PS3">PS3</option>
                    <option value="PS4">PS4</option><option value="PS5">PS5</option>
                    <option value="Switch">Switch</option><option value="Switch 2">Switch 2</option>
                    <option value="WII">WII</option>
                    <option value="PC">PC</option>
                </select>
            </div>
            <div class="lista-juegos-steam-contenido" id="listaJuegosSteamContenido"><p style="color:#888;text-align:center;padding:40px;">Cargando...</p></div>
        </div>
        <div class="detalle-juego-steam" id="detalleJuegoSteam">
            <div class="detalle-vacio"><p style="font-size:60px;">🎮</p><p style="font-size:20px;">Selecciona un juego</p></div>
        </div>
        <div class="tienda-steam" id="tiendaSteam" style="display:none;">
            <div style="display:flex;gap:8px;margin-bottom:16px;">
                <input type="text" id="busquedaTienda" placeholder="🔍 Buscar juegos..." style="flex:1;padding:10px 14px;border:1px solid #333;border-radius:8px;background:#16213e;color:#eee;font-size:14px;">
                <select id="filtroPlataformaSteam" onchange="mostrarTienda()" style="padding:10px;border:1px solid #333;border-radius:8px;background:#16213e;color:#eee;font-size:13px;">
                    <option value="">Todas</option>
                    <option value="GBA">GBA</option><option value="DS">DS</option><option value="3DS">3DS</option>
                    <option value="PSP">PSP</option><option value="PS2">PS2</option><option value="PS3">PS3</option>
                    <option value="PS4">PS4</option><option value="PS5">PS5</option>
                    <option value="Switch">Switch</option><option value="Switch 2">Switch 2</option>
                    <option value="Wii">Wii</option>
                </select>
            </div>
            <div id="gridTienda" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;"></div>
        </div>
        <div class="descargas-steam" id="descargasSteam" style="display:none;">
            <h2 style="color:#ccc;margin-bottom:20px;">📥 Descargas</h2>
            <div><h3 style="color:#4ecca3;margin-bottom:12px;">🔄 En progreso</h3><div id="descargasEnProgreso"></div></div>
            <div style="margin-top:30px;"><h3 style="color:#888;margin-bottom:12px;">✅ Completadas</h3><div id="descargasCompletadas"></div></div>
        </div>
        
        <!-- Modal tienda -->
        <div class="modal-tienda" id="modalTienda">
            <div class="modal-tienda-contenido">
                <button class="modal-cerrar" onclick="cerrarModalTienda()">✕</button>
                <div id="modalTiendaBody"></div>
            </div>
        </div>
        <!-- Modal opciones -->
        <div class="modal-tienda" id="modalOpcionesSteam">
            <div class="modal-tienda-contenido" style="text-align:left;">
                <button class="modal-cerrar" onclick="cerrarModalOpcionesSteam()">✕</button>
                <h2 style="color:#fff;margin-bottom:16px;">⚙️ Opciones</h2>
                <div class="mensaje" id="mensajeOpcionesSteam" style="display:none;padding:10px;border-radius:8px;margin-bottom:12px;"></div>
                <div class="opcion-tarjeta" style="background:rgba(255,255,255,0.03);border-radius:10px;padding:16px;margin-bottom:16px;border:1px solid #2a2a3e;">
                    <h3 style="color:#f0a500;margin-bottom:12px;font-size:14px;">🎨 Apariencia</h3>
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <label style="color:#a0a0b0;font-size:14px;">Vista predeterminada</label>
                        <select id="vistaPredeterminadaSteam" style="padding:10px 14px;border:1px solid #2a2a3e;border-radius:8px;background:#1a1a2e;color:#e8e8e8;font-size:14px;cursor:pointer;">
                            <option value="clasica">📋 Vista Clásica</option>
                            <option value="steam">🖥️ Vista Steam</option>
                        </select>
                    </div>
                </div>
                <button onclick="guardarOpcionesSteam()" style="width:100%;padding:14px;background:#4ecca3;color:#1a1a2e;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">💾 Guardar opciones</button>
            </div>
        </div>
    </div>

    <script>
        function cerrarSesionSteam() { localStorage.clear(); window.location.href = '/selector.html'; }

        function abrirModalOpcionesSteam() {
            fetch(`/api/configuracion/${usuarioActual}`)
                .then(r => r.json())
                .then(config => {
                    document.getElementById('vistaPredeterminadaSteam').value = config.vista || 'clasica';
                })
                .catch(() => {});
            document.getElementById('modalOpcionesSteam').classList.add('activo');
            document.body.style.overflow = 'hidden';
        }

        function cerrarModalOpcionesSteam() {
            document.getElementById('modalOpcionesSteam').classList.remove('activo');
            document.body.style.overflow = '';
        }

        async function guardarOpcionesSteam() {
            const vista = document.getElementById('vistaPredeterminadaSteam').value;
            const m = document.getElementById('mensajeOpcionesSteam');
            
            try {
                const res = await fetch('/api/configuracion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario: usuarioActual, config: { vista } })
                });
                
                const datos = await res.json();
                
                if (datos.ok) {
                    m.textContent = '✅ Opciones guardadas. Redirigiendo...';
                    m.style.cssText = 'display:block;background:#4ecca3;color:#1a1a2e;padding:10px;border-radius:8px;margin-bottom:12px;';
                    setTimeout(() => {
                        window.location.href = vista === 'steam' ? 'steam.html' : 'index.html';
                    }, 600);
                } else {
                    m.textContent = '❌ Error al guardar';
                    m.style.cssText = 'display:block;background:#e94560;color:#fff;padding:10px;border-radius:8px;margin-bottom:12px;';
                }
            } catch (e) {
                m.textContent = '❌ Error de conexión';
                m.style.cssText = 'display:block;background:#e94560;color:#fff;padding:10px;border-radius:8px;margin-bottom:12px;';
            }
        }

        document.getElementById('modalOpcionesSteam').addEventListener('click', function(e) {
            if (e.target === this) cerrarModalOpcionesSteam();
        });
    </script>
    <script src="js/config.js"></script>
    <script src="js/steam.js"></script>
</body>
</html>
